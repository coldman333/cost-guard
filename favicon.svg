<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- sea background -->
  <rect width="32" height="32" rx="5" fill="#1e4d6b"/>
  <!-- waves -->
  <rect x="0" y="22" width="32" height="10" rx="0" fill="#163d56"/>
  <path d="M0 23 Q8 21 16 23 Q24 25 32 23" stroke="#2d6e96" stroke-width="1.2" fill="none"/>
  <!-- turret base (mound) -->
  <ellipse cx="10" cy="22" rx="7" ry="3" fill="#7a6540"/>
  <!-- turret body -->
  <rect x="5" y="16" width="10" height="7" rx="2" fill="#4a5b40"/>
  <!-- barrel (pointing upper-right at ~30°) -->
  <rect x="12" y="11" width="13" height="3.5" rx="1.5"
        transform="rotate(-20 12 12.75)" fill="#2a2a2a"/>
  <!-- muzzle flash dot -->
  <circle cx="26" cy="8" r="1.5" fill="#ffe06b" opacity="0.9"/>
</svg>
